name: Daily Macro Update

on:
  schedule:
    - cron: '0 11 * * 1-5'   # Mon–Fri 11:00 UTC = 7am EDT / 6am EST
  workflow_dispatch:
    inputs:
      force_ai:
        description: 'Force Agent 3 (Claude AI) to run'
        required: false
        default: 'false'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Check setup
        run: |
          echo "FRED key set:   ${{ secrets.FRED_API_KEY != '' }}"
          echo "BLS key set:    ${{ secrets.BLS_API_KEY != '' }}"
          echo "EIA key set:    ${{ secrets.EIA_API_KEY != '' }}"
          echo "Claude key set:  ${{ secrets.ANTHROPIC_API_KEY != '' }}"
          echo "Resend key set:  ${{ secrets.RESEND_API_KEY != '' }}"
          ls scripts/
          ls data/ || echo "data/ missing"

      - name: Agent 1 — Collector
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          BLS_API_KEY:  ${{ secrets.BLS_API_KEY }}
          EIA_API_KEY:  ${{ secrets.EIA_API_KEY }}
        run: python scripts/collector.py

      - name: Agent 2 — Analyzer
        run: python scripts/analyzer.py

      - name: Agent 3 — Analyst (claude-sonnet-4-6)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCE_AI: ${{ github.event.inputs.force_ai || 'false' }}
        run: |
          DAY=$(date -u +'%d')
          if [ "$DAY" = "01" ] || [ "$FORCE_AI" = "true" ]; then
            echo "Running Agent 3"
            python scripts/briefing_agent.py
          else
            echo "Skipping Agent 3 — daily patch only"
          fi

      - name: Agent 4 — Renderer
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/renderer.py

      - name: Agent 5 — Publisher
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
        run: python scripts/publisher.py

      - name: Commit and push
        run: |
          git config user.name  "briefing-bot"
          git config user.email "briefing-bot@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add index.html data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Daily update: $(date -u +'%Y-%m-%d')"
            git push
          fi
