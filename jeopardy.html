<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Jeopardy!</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #060CE9;
    --blue-dark: #04089A;
    --gold: #FFCC00;
    --gold-dark: #D4A800;
    --white: #FFFFFF;
    --shadow: rgba(0,0,0,0.4);
  }

  body {
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    background: #0a0a2e;
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── Setup Screen ─── */
  .setup-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    animation: fadeIn 0.5s ease;
  }
  .setup-screen h1 {
    font-size: 3rem;
    color: var(--gold);
    text-shadow: 3px 3px 6px var(--shadow);
    margin-bottom: 0.5rem;
    letter-spacing: 4px;
  }
  .setup-screen .subtitle {
    font-size: 1.1rem;
    color: #aaa;
    margin-bottom: 2rem;
  }
  .setup-box {
    background: rgba(255,255,255,0.07);
    border: 2px solid rgba(255,204,0,0.3);
    border-radius: 16px;
    padding: 2rem 2.5rem;
    width: 100%;
    max-width: 520px;
  }
  .setup-box label {
    display: block;
    font-weight: 600;
    margin-bottom: 0.3rem;
    color: var(--gold);
  }
  .setup-box select, .setup-box input {
    width: 100%;
    padding: 0.6rem 0.8rem;
    border: 1px solid #444;
    border-radius: 8px;
    background: #1a1a4e;
    color: #fff;
    font-size: 1rem;
    margin-bottom: 1rem;
    outline: none;
  }
  .setup-box select:focus, .setup-box input:focus {
    border-color: var(--gold);
  }
  .team-names { display: none; flex-direction: column; gap: 0.3rem; margin-bottom: 1rem; }
  .team-names.visible { display: flex; }
  .btn {
    display: inline-block;
    padding: 0.75rem 2rem;
    font-size: 1.1rem;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow); }
  .btn-gold {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: #1a1a4e;
  }
  .btn-blue {
    background: linear-gradient(135deg, var(--blue), var(--blue-dark));
    color: var(--white);
  }
  .btn-small { padding: 0.4rem 1rem; font-size: 0.85rem; }
  .btn-danger { background: linear-gradient(135deg, #e74c3c, #c0392b); color: #fff; }

  /* ─── Game Board ─── */
  .game-screen { display: none; flex-direction: column; min-height: 100vh; }
  .game-screen.active { display: flex; }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.75rem 1.5rem;
    background: linear-gradient(90deg, #060CE9, #1a1a4e);
    border-bottom: 3px solid var(--gold);
  }
  .top-bar h2 { font-size: 1.5rem; color: var(--gold); letter-spacing: 3px; }
  .top-bar .round-label { color: #ccc; font-size: 0.9rem; }

  .board {
    display: grid;
    gap: 6px;
    padding: 12px;
    flex: 1;
  }
  .board .cat-header {
    background: linear-gradient(180deg, var(--blue), var(--blue-dark));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-weight: 800;
    font-size: 0.95rem;
    color: var(--white);
    text-transform: uppercase;
    padding: 0.5rem 0.3rem;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    letter-spacing: 1px;
    min-height: 60px;
  }
  .board .cell {
    background: linear-gradient(180deg, #1a3cd4, #0b1f8a);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--gold);
    text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
    cursor: pointer;
    transition: transform 0.15s, background 0.2s;
    min-height: 70px;
    user-select: none;
  }
  .cell:hover:not(.used) { background: linear-gradient(180deg, #2a50e8, #1530b0); transform: scale(1.04); }
  .cell.used { background: #111140; color: transparent; cursor: default; pointer-events: none; }

  /* ─── Scoreboard ─── */
  .scoreboard {
    display: flex;
    justify-content: center;
    gap: 1rem;
    padding: 0.75rem 1rem;
    background: #0d0d3b;
    border-top: 2px solid #222;
    flex-wrap: wrap;
  }
  .team-score {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0.4rem 1.2rem;
    border-radius: 10px;
    min-width: 100px;
    position: relative;
  }
  .team-score .t-name { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .team-score .t-pts { font-size: 1.4rem; font-weight: 800; color: var(--gold); }
  .team-score.active-team { outline: 3px solid var(--gold); outline-offset: 2px; }

  /* ─── Question Modal ─── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: none; align-items: center; justify-content: center;
    z-index: 1000;
    animation: fadeIn 0.3s ease;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: linear-gradient(145deg, var(--blue), var(--blue-dark));
    border: 4px solid var(--gold);
    border-radius: 20px;
    padding: 2.5rem 3rem;
    max-width: 700px;
    width: 90%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    animation: scaleIn 0.3s ease;
  }
  .modal .category-label { font-size: 0.9rem; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 0.3rem; }
  .modal .points-label { font-size: 1rem; color: #ccc; margin-bottom: 1.5rem; }
  .modal .question-text { font-size: 1.6rem; font-weight: 600; line-height: 1.4; margin-bottom: 2rem; }
  .modal .answer-text {
    font-size: 1.3rem;
    color: var(--gold);
    font-weight: 700;
    margin-bottom: 1.5rem;
    display: none;
    padding: 1rem;
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
  }
  .modal .answer-text.visible { display: block; animation: fadeIn 0.4s ease; }
  .modal .btn-row { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
  .modal .team-buzz-btn {
    padding: 0.5rem 1rem;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.9rem;
  }
  .modal .team-buzz-btn:hover { background: rgba(255,255,255,0.25); border-color: var(--gold); }

  /* ─── Winner Screen ─── */
  .winner-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 2rem;
    animation: fadeIn 0.5s ease;
  }
  .winner-screen.active { display: flex; }
  .winner-screen .trophy { font-size: 6rem; margin-bottom: 1rem; }
  .winner-screen h1 { font-size: 2.8rem; color: var(--gold); margin-bottom: 0.5rem; }
  .winner-screen .winner-name { font-size: 2rem; color: #fff; margin-bottom: 2rem; }
  .winner-screen .final-scores { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 2rem; }
  .winner-screen .fs-row { font-size: 1.2rem; color: #ccc; }
  .winner-screen .fs-row.first { color: var(--gold); font-weight: 800; font-size: 1.5rem; }

  /* ─── Animations ─── */
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  @keyframes scaleIn { from { opacity: 0; transform: scale(0.8) } to { opacity: 1; transform: scale(1) } }

  .confetti-canvas { position: fixed; inset: 0; z-index: 2000; pointer-events: none; }

  /* team colours */
  .tc0 { background: rgba(231,76,60,0.25); border: 2px solid #e74c3c; }
  .tc1 { background: rgba(46,204,113,0.25); border: 2px solid #2ecc71; }
  .tc2 { background: rgba(52,152,219,0.25); border: 2px solid #3498db; }
  .tc3 { background: rgba(241,196,15,0.25); border: 2px solid #f1c40f; }
  .tc4 { background: rgba(155,89,182,0.25); border: 2px solid #9b59b6; }

  /* ─── Edit Questions Modal ─── */
  .edit-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.9);
    display: none; align-items: flex-start; justify-content: center;
    z-index: 1100;
    overflow-y: auto;
    padding: 2rem;
  }
  .edit-overlay.open { display: flex; }
  .edit-panel {
    background: #12123e;
    border: 2px solid var(--gold);
    border-radius: 16px;
    padding: 2rem;
    width: 100%;
    max-width: 900px;
  }
  .edit-panel h2 { color: var(--gold); margin-bottom: 1rem; }
  .edit-cat { margin-bottom: 1.5rem; }
  .edit-cat h3 { color: var(--gold); margin-bottom: 0.5rem; font-size: 1rem; }
  .edit-cat input, .edit-cat textarea {
    width: 100%; padding: 0.4rem 0.6rem; margin-bottom: 0.3rem;
    border: 1px solid #444; border-radius: 6px;
    background: #1a1a4e; color: #fff; font-size: 0.85rem;
  }
  .edit-cat textarea { min-height: 40px; resize: vertical; }
  .edit-q-row { display: grid; grid-template-columns: 60px 1fr 1fr; gap: 0.4rem; align-items: start; margin-bottom: 0.4rem; }
  .edit-q-row span { color: var(--gold); font-weight: 700; padding-top: 0.4rem; }

  @media (max-width: 700px) {
    .board .cat-header { font-size: 0.7rem; }
    .board .cell { font-size: 1.1rem; min-height: 50px; }
    .modal { padding: 1.5rem; }
    .modal .question-text { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<!-- ═══════════ SETUP SCREEN ═══════════ -->
<div class="setup-screen" id="setupScreen">
  <h1>JEOPARDY!</h1>
  <p class="subtitle">Team Edition</p>
  <div class="setup-box">
    <label for="numTeams">Number of Teams (2-5)</label>
    <select id="numTeams">
      <option value="2">2 Teams</option>
      <option value="3" selected>3 Teams</option>
      <option value="4">4 Teams</option>
      <option value="5">5 Teams</option>
    </select>

    <div class="team-names visible" id="teamNamesDiv"></div>

    <div style="text-align:center; margin-top:1rem; display:flex; gap:0.75rem; justify-content:center; flex-wrap:wrap;">
      <button class="btn btn-gold" onclick="startGame()">Start Game</button>
      <button class="btn btn-blue btn-small" onclick="openEditQuestions()">Edit Questions</button>
    </div>
  </div>
</div>

<!-- ═══════════ GAME SCREEN ═══════════ -->
<div class="game-screen" id="gameScreen">
  <div class="top-bar">
    <h2>JEOPARDY!</h2>
    <span class="round-label" id="roundLabel">Round 1 of 1</span>
    <button class="btn btn-small btn-danger" onclick="endGameEarly()">End Game</button>
  </div>
  <div class="board" id="board"></div>
  <div class="scoreboard" id="scoreboard"></div>
</div>

<!-- ═══════════ QUESTION MODAL ═══════════ -->
<div class="modal-overlay" id="questionModal">
  <div class="modal">
    <div class="category-label" id="qCat"></div>
    <div class="points-label" id="qPts"></div>
    <div class="question-text" id="qText"></div>
    <div class="answer-text" id="qAnswer"></div>
    <div class="btn-row" id="buzzRow"></div>
    <div style="margin-top: 1rem;" id="qActions"></div>
  </div>
</div>

<!-- ═══════════ EDIT QUESTIONS MODAL ═══════════ -->
<div class="edit-overlay" id="editOverlay">
  <div class="edit-panel" id="editPanel">
    <h2>Edit Categories &amp; Questions</h2>
    <div id="editContent"></div>
    <div style="text-align:center; margin-top:1.5rem; display:flex; gap:0.75rem; justify-content:center;">
      <button class="btn btn-gold" onclick="saveEdits()">Save</button>
      <button class="btn btn-blue btn-small" onclick="closeEditQuestions()">Cancel</button>
    </div>
  </div>
</div>

<!-- ═══════════ WINNER SCREEN ═══════════ -->
<div class="winner-screen" id="winnerScreen">
  <div class="trophy">🏆</div>
  <h1>GAME OVER!</h1>
  <div class="winner-name" id="winnerName"></div>
  <div class="final-scores" id="finalScores"></div>
  <button class="btn btn-gold" onclick="resetGame()">Play Again</button>
</div>

<script>
/* ════════════════════════════════════════════
   DEFAULT QUESTION DATA
   ════════════════════════════════════════════ */
let CATEGORIES = [
  {
    name: "Science & Nature",
    questions: [
      { q: "This planet is known as the Red Planet.", a: "What is Mars?", pts: 100 },
      { q: "This gas makes up about 78% of Earth's atmosphere.", a: "What is Nitrogen?", pts: 200 },
      { q: "This organ in the human body produces insulin.", a: "What is the Pancreas?", pts: 300 },
      { q: "This scientist proposed the theory of general relativity.", a: "Who is Albert Einstein?", pts: 400 },
      { q: "This is the hardest natural substance on Earth.", a: "What is Diamond?", pts: 500 },
    ]
  },
  {
    name: "Pop Culture",
    questions: [
      { q: "This movie franchise features a character named 'Luke Skywalker'.", a: "What is Star Wars?", pts: 100 },
      { q: "This streaming service produced 'Stranger Things'.", a: "What is Netflix?", pts: 200 },
      { q: "This artist released the album 'Thriller' in 1982.", a: "Who is Michael Jackson?", pts: 300 },
      { q: "This TV show features dragons and a character called the 'Mother of Dragons'.", a: "What is Game of Thrones?", pts: 400 },
      { q: "This band performed at the very first Woodstock and played 'The Star-Spangled Banner'.", a: "Who is Jimi Hendrix?", pts: 500 },
    ]
  },
  {
    name: "World Geography",
    questions: [
      { q: "This is the largest continent by area.", a: "What is Asia?", pts: 100 },
      { q: "This river is the longest in Africa.", a: "What is the Nile?", pts: 200 },
      { q: "This country has the most natural lakes in the world.", a: "What is Canada?", pts: 300 },
      { q: "This desert is the largest hot desert in the world.", a: "What is the Sahara?", pts: 400 },
      { q: "This is the smallest country in the world by area.", a: "What is Vatican City?", pts: 500 },
    ]
  },
  {
    name: "History",
    questions: [
      { q: "This wall fell in 1989, reuniting a divided nation.", a: "What is the Berlin Wall?", pts: 100 },
      { q: "This ancient civilization built the Machu Picchu complex.", a: "Who are the Incas?", pts: 200 },
      { q: "This ship sank on its maiden voyage in April 1912.", a: "What is the Titanic?", pts: 300 },
      { q: "This document, signed in 1215, limited the power of the English king.", a: "What is the Magna Carta?", pts: 400 },
      { q: "This empire was ruled by Genghis Khan at its peak.", a: "What is the Mongol Empire?", pts: 500 },
    ]
  },
  {
    name: "Food & Drink",
    questions: [
      { q: "This Italian dish is made from layers of pasta, meat sauce, and cheese.", a: "What is Lasagna?", pts: 100 },
      { q: "This fruit is known as the 'king of fruits' and has a strong smell.", a: "What is Durian?", pts: 200 },
      { q: "This country is the largest producer of coffee in the world.", a: "What is Brazil?", pts: 300 },
      { q: "This spice comes from the dried stigma of a crocus flower and is the most expensive by weight.", a: "What is Saffron?", pts: 400 },
      { q: "This Japanese dish consists of vinegared rice paired with raw fish.", a: "What is Sushi?", pts: 500 },
    ]
  },
  {
    name: "Tech & Innovation",
    questions: [
      { q: "This company created the iPhone.", a: "What is Apple?", pts: 100 },
      { q: "This programming language shares its name with an island in Indonesia.", a: "What is Java?", pts: 200 },
      { q: "This person co-founded Microsoft with Bill Gates.", a: "Who is Paul Allen?", pts: 300 },
      { q: "This protocol is the foundation of data communication on the World Wide Web.", a: "What is HTTP?", pts: 400 },
      { q: "This AI model architecture, introduced in 2017, revolutionized natural language processing.", a: "What is the Transformer?", pts: 500 },
    ]
  }
];

/* ════════════════════════════════════════════
   GAME STATE
   ════════════════════════════════════════════ */
let teams = [];
let usedCells = new Set();
let currentQ = null;
let totalCells = 0;

const TEAM_COLORS = ['#e74c3c','#2ecc71','#3498db','#f1c40f','#9b59b6'];

/* ═══ SETUP ═══ */
const numTeamsEl = document.getElementById('numTeams');
const teamNamesDiv = document.getElementById('teamNamesDiv');

function renderTeamInputs() {
  const n = parseInt(numTeamsEl.value);
  teamNamesDiv.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.placeholder = `Team ${i + 1} name`;
    inp.value = `Team ${i + 1}`;
    inp.id = `teamInput${i}`;
    teamNamesDiv.appendChild(inp);
  }
}
numTeamsEl.addEventListener('change', renderTeamInputs);
renderTeamInputs();

/* ═══ EDIT QUESTIONS ═══ */
function openEditQuestions() {
  const container = document.getElementById('editContent');
  container.innerHTML = '';
  CATEGORIES.forEach((cat, ci) => {
    const div = document.createElement('div');
    div.className = 'edit-cat';
    let html = `<h3>Category ${ci + 1}</h3>`;
    html += `<input type="text" id="ecName${ci}" value="${cat.name}" placeholder="Category name">`;
    cat.questions.forEach((q, qi) => {
      html += `<div class="edit-q-row">
        <span>$${q.pts}</span>
        <textarea id="ecQ${ci}_${qi}" placeholder="Question">${q.q}</textarea>
        <textarea id="ecA${ci}_${qi}" placeholder="Answer">${q.a}</textarea>
      </div>`;
    });
    div.innerHTML = html;
    container.appendChild(div);
  });
  document.getElementById('editOverlay').classList.add('open');
}
function closeEditQuestions() { document.getElementById('editOverlay').classList.remove('open'); }
function saveEdits() {
  CATEGORIES.forEach((cat, ci) => {
    cat.name = document.getElementById(`ecName${ci}`).value || cat.name;
    cat.questions.forEach((q, qi) => {
      q.q = document.getElementById(`ecQ${ci}_${qi}`).value || q.q;
      q.a = document.getElementById(`ecA${ci}_${qi}`).value || q.a;
    });
  });
  closeEditQuestions();
}

/* ═══ START GAME ═══ */
function startGame() {
  const n = parseInt(numTeamsEl.value);
  teams = [];
  for (let i = 0; i < n; i++) {
    const name = document.getElementById(`teamInput${i}`).value.trim() || `Team ${i + 1}`;
    teams.push({ name, score: 0 });
  }
  usedCells = new Set();
  totalCells = CATEGORIES.length * 5;

  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('gameScreen').classList.add('active');
  renderBoard();
  renderScoreboard();
}

function renderBoard() {
  const board = document.getElementById('board');
  const cols = CATEGORIES.length;
  board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  board.innerHTML = '';

  CATEGORIES.forEach(cat => {
    const hdr = document.createElement('div');
    hdr.className = 'cat-header';
    hdr.textContent = cat.name;
    board.appendChild(hdr);
  });

  for (let row = 0; row < 5; row++) {
    CATEGORIES.forEach((cat, ci) => {
      const cell = document.createElement('div');
      cell.className = 'cell';
      const key = `${ci}-${row}`;
      cell.dataset.key = key;
      cell.textContent = `$${cat.questions[row].pts}`;
      if (usedCells.has(key)) cell.classList.add('used');
      else cell.addEventListener('click', () => openQuestion(ci, row));
      board.appendChild(cell);
    });
  }
}

function renderScoreboard() {
  const sb = document.getElementById('scoreboard');
  sb.innerHTML = '';
  teams.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = `team-score tc${i}`;
    div.innerHTML = `<span class="t-name">${escHtml(t.name)}</span><span class="t-pts">$${t.score}</span>`;
    sb.appendChild(div);
  });
}

/* ═══ QUESTION MODAL ═══ */
function openQuestion(ci, qi) {
  const cat = CATEGORIES[ci];
  const q = cat.questions[qi];
  currentQ = { ci, qi, pts: q.pts };

  document.getElementById('qCat').textContent = cat.name;
  document.getElementById('qPts').textContent = `$${q.pts}`;
  document.getElementById('qText').textContent = q.q;

  const ansEl = document.getElementById('qAnswer');
  ansEl.textContent = q.a;
  ansEl.classList.remove('visible');

  // Build buzz-in buttons for each team
  const buzzRow = document.getElementById('buzzRow');
  buzzRow.innerHTML = '';
  teams.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'team-buzz-btn';
    btn.style.borderColor = TEAM_COLORS[i];
    btn.textContent = t.name;
    btn.addEventListener('click', () => awardPoints(i));
    buzzRow.appendChild(btn);
  });

  // Action buttons
  const actions = document.getElementById('qActions');
  actions.innerHTML = `
    <button class="btn btn-gold btn-small" onclick="revealAnswer()">Show Answer</button>
    <button class="btn btn-blue btn-small" onclick="noOneGotIt()">No Correct Answer</button>
  `;

  document.getElementById('questionModal').classList.add('open');
}

function revealAnswer() {
  document.getElementById('qAnswer').classList.add('visible');
}

function awardPoints(teamIdx) {
  if (!currentQ) return;
  teams[teamIdx].score += currentQ.pts;
  closeQuestion();
}

function noOneGotIt() {
  closeQuestion();
}

function closeQuestion() {
  if (currentQ) {
    const key = `${currentQ.ci}-${currentQ.qi}`;
    usedCells.add(key);
  }
  currentQ = null;
  document.getElementById('questionModal').classList.remove('open');
  renderBoard();
  renderScoreboard();

  // Check if all questions answered
  if (usedCells.size >= totalCells) {
    setTimeout(showWinner, 500);
  }
}

/* ═══ DEDUCT POINTS (wrong answer) ═══ */
function deductPoints(teamIdx) {
  if (!currentQ) return;
  teams[teamIdx].score -= currentQ.pts;
  renderScoreboard();
}

/* ═══ END GAME ═══ */
function endGameEarly() {
  if (confirm('End the game now and show final scores?')) showWinner();
}

function showWinner() {
  document.getElementById('gameScreen').classList.remove('active');
  const ws = document.getElementById('winnerScreen');
  ws.classList.add('active');

  const sorted = [...teams].sort((a, b) => b.score - a.score);
  document.getElementById('winnerName').textContent = `${sorted[0].name} wins with $${sorted[0].score}!`;

  const fs = document.getElementById('finalScores');
  fs.innerHTML = '';
  sorted.forEach((t, i) => {
    const row = document.createElement('div');
    row.className = `fs-row${i === 0 ? ' first' : ''}`;
    row.textContent = `${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '  '} ${t.name}: $${t.score}`;
    fs.appendChild(row);
  });

  launchConfetti();
}

function resetGame() {
  document.getElementById('winnerScreen').classList.remove('active');
  document.getElementById('setupScreen').style.display = '';
  renderTeamInputs();
}

/* ═══ CONFETTI ═══ */
function launchConfetti() {
  const canvas = document.createElement('canvas');
  canvas.className = 'confetti-canvas';
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const pieces = [];
  const colors = ['#e74c3c','#2ecc71','#3498db','#f1c40f','#9b59b6','#ff6b6b','#ffd93d','#6bcb77'];
  for (let i = 0; i < 200; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      w: Math.random() * 10 + 5,
      h: Math.random() * 6 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      vy: Math.random() * 3 + 2,
      vx: (Math.random() - 0.5) * 2,
      rot: Math.random() * 360,
      rv: (Math.random() - 0.5) * 10,
    });
  }

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate((p.rot * Math.PI) / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
      p.y += p.vy;
      p.x += p.vx;
      p.rot += p.rv;
    });
    frame++;
    if (frame < 180) requestAnimationFrame(draw);
    else canvas.remove();
  }
  draw();
}

/* ═══ UTILS ═══ */
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
